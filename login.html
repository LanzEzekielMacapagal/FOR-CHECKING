<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Global Techno Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="login-shell" id="portalLogin">
    <div class="card login-card">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <img src="assets/global-techno-hub-logo.jpg" alt="Global Techno Hub Learning Center logo" class="login-logo mb-3">
          <p class="section-label mb-1">Portal access</p>
          <h1 class="h4 mb-1">Global Techno Hub</h1>
          <p class="text-secondary mb-0">Sign in to continue to your dashboard.</p>
        </div>
        <form id="portalLoginForm" class="vstack gap-3">
          <label class="form-label mb-0">
            Username
            <input class="form-control mt-1" id="portalUsername" type="text" autocomplete="username" required>
          </label>
          <label class="form-label mb-0">
            Password
            <input class="form-control mt-1" id="portalPassword" type="password" autocomplete="current-password" required>
          </label>
          <p class="alert alert-info mb-0">
            Demo accounts: <strong>Admin / 123</strong> or <strong>user / 321</strong>
          </p>
          <p class="alert alert-danger d-none mb-0" id="portalLoginError">Invalid username or password.</p>
          <button class="btn btn-primary w-100" type="submit">Login</button>
          <a class="btn btn-outline-secondary w-100" href="register.html">Create Account</a>
        </form>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
