<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Global Techno Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="login-shell">
    <div class="card login-card">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <img src="assets/global-techno-hub-logo.jpg" alt="Global Techno Hub Learning Center logo" class="login-logo mb-3">
          <p class="section-label mb-1">Create account</p>
          <h1 class="h4 mb-1">Register</h1>
          <p class="text-secondary mb-0">Demo registration form for trainees.</p>
        </div>
        <form class="vstack gap-3">
          <label class="form-label mb-0">Full name<input class="form-control mt-1" type="text" required></label>
          <label class="form-label mb-0">Email<input class="form-control mt-1" type="email" required></label>
          <label class="form-label mb-0">Username<input class="form-control mt-1" type="text" required></label>
          <label class="form-label mb-0">Password<input class="form-control mt-1" type="password" required></label>
          <button class="btn btn-primary w-100" type="button">Register</button>
          <a class="btn btn-outline-secondary w-100" href="login.html">Back to Login</a>
        </form>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
